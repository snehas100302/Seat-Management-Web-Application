spring:
  application:
    name: Seat Management
    version: 1.0.0
  jackson:
    time-zone: Asia/Kolkata
  servlet:
    multipart:
      enabled: true
      max-request-size: 10MB
      max-file-size: 10MB
  profiles:
    active: dev
  web:
    resources:
      cache:
        period: 31536000
      chain:
        enabled: true
        cache: true
    error:
      whitelabel:
        enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/seat_mgmt_db
    username: postgres
    password: 29587674
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
  threads:
    virtual:
      enabled: true

server:
  port: 8085

app:
  logging:
    dir: ${user.dir}/logs
  assets:
    strategy: DYNAMIC
    context-path: /assets/

info:
  app:
    name: seat-management-api
    version: 1.0.0
    description: API for seat management application

springdoc:
  swagger-ui:
    operations-sorter: method
  api-docs:
    path: /api-docs

logging:
  level:
    org.springframework.security: DEBUG


management:
  server:
    base-path: "/actuator"
    port: ${server.port}
  info:
    env:
      enabled: true
  endpoint:
    metrics:
      access: unrestricted
    info:
      access: unrestricted
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include:
          - health
          - metrics
          - info